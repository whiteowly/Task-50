services:
  db:
    image: mysql:8.4
    container_name: forgeops-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: forgeops-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:?Set DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      DB_NAME: ${DB_NAME:?Set DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      ENCRYPTION_KEY_HEX: ${ENCRYPTION_KEY_HEX:?Set ENCRYPTION_KEY_HEX}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: forgeops-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "5173:80"

  test-runner:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      NODE_ENV: test
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${DB_USER:?Set DB_USER}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      DB_NAME: ${DB_NAME:?Set DB_NAME}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      ENCRYPTION_KEY_HEX: ${ENCRYPTION_KEY_HEX:?Set ENCRYPTION_KEY_HEX}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - test

volumes:
  db_data:
